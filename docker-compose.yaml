# High host ports to avoid clashing with other local stacks.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sc
      POSTGRES_PASSWORD: sc
      POSTGRES_DB: simcrowd
    ports:
      - "25432:5432"
    volumes:
      - sc_pgdata:/var/lib/postgresql/data
      - ./deploy/db/init.sql:/docker-entrypoint-initdb.d/010-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sc -d simcrowd"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api
    environment:
      DATABASE_URL: postgresql://sc:sc@db:5432/simcrowd
      SC_SEED: "42"
      SC_OFFLINE_LLM: "1"
    ports:
      - "28000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./artifacts:/app/artifacts
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:28000
      API_INTERNAL_URL: http://api:8000
    ports:
      - "23000:3000"
    depends_on:
      - api

volumes:
  sc_pgdata:
