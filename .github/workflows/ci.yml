name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Unit tests
        env:
          SC_OFFLINE_LLM: "1"
        run: pytest -q
      - name: Smoke evals
        env:
          SC_OFFLINE_LLM: "1"
        run: python evals/run_evals.py --smoke 20

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and build
        working-directory: web
        run: |
          npm install
          npm run build

  compose-demo:
    runs-on: ubuntu-latest
    needs: [unit, web-build]
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: |
          export SC_OFFLINE_LLM=1
          docker compose up -d --build
      - name: Wait for health
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://localhost:28000/health; then
              exit 0
            fi
            sleep 4
          done
          docker compose logs
          exit 1
      - name: Panel + study
        run: |
          curl -sf -X POST "http://localhost:28000/panels?size=20&seed=42" | tee /tmp/panel.json
          curl -sf -X POST "http://localhost:28000/studies?spec_path=data/concepts/fintech_survey.json&seed=42" | tee /tmp/study.json
          python3 - <<'PY'
          import json
          s=json.load(open("/tmp/study.json"))
          assert s["n"] == 20, s
          assert s["consistency_rate"] >= 0.9, s
          assert s["verification_ok"] is True, s
          print("study ok", s["report_id"], s["cost_usd"])
          PY
      - name: Tear down
        if: always()
        run: docker compose down -v
